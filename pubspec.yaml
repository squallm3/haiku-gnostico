name: haiku_gnostico
description: Escuela de los Haikus Gnósticos — Sistema Operativo de la Gnosis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0
  cloud_functions: ^5.1.0

  rxdart: ^0.27.7
  gal: ^1.2.1

  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # Payments
  # purchases_flutter: ^6.20.1   # agregar cuando vayas a publicar
  google_sign_in: ^6.2.1

  # UI
  animate_do: ^3.3.4
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  glassmorphism: ^3.0.0
  flutter_svg: ^2.0.9

  # Video
  video_player: ^2.8.2
  chewie: ^1.7.4

  # Utils
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  http: ^1.2.0
  dio: ^5.4.1

  # 3D viewer
  model_viewer_plus: ^1.7.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/zorro.png"
  adaptive_icon_background: "#0e0b1a"
  adaptive_icon_foreground: "assets/images/zorro.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/remeras/
  # fonts: agregar cuando tengas los archivos .ttf en assets/fonts/
